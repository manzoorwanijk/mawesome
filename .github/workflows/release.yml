name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # never cancel an in-flight publish

# Least privilege: no permissions by default; each job grants only what it needs.
permissions: {}

jobs:
  # Re-run the full gate (read-only) so nothing publishes without it.
  verify:
    name: Verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run verification gate
        run: pnpm verify

  release:
    name: Publish
    needs: verify
    runs-on: ubuntu-latest
    # Configure a protected "npm-publish" environment (required reviewers / branch
    # restriction) in the repo settings, and scope each npm trusted-publisher entry to
    # it, for an extra approval gate before any publish.
    environment: npm-publish
    permissions:
      # The App token (minted below) handles the git push + Version PR, so the built-in
      # GITHUB_TOKEN needs no write — keep its blast radius minimal.
      contents: read
      id-token: write # npm OIDC trusted publishing (no NPM_TOKEN)
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit
      # A GitHub App token — not the built-in GITHUB_TOKEN, whose events can't trigger other
      # workflows, so the Version PR it opens would never run CI. The App token makes the PR
      # (and the branch push) trigger `verify.yml` like a human-opened PR.
      - name: Mint a GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      # Credentials persist here (the App token) so changesets can push the Version PR branch.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      # Node 24 bundles npm >= 11.5.1, which OIDC trusted publishing requires.
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build packages
        run: pnpm build:packages # dist must exist for `changeset publish` (apps don't publish)
      - name: Create Version PR or publish
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          title: Prep release
          version: pnpm run version
          publish: pnpm run release
        env:
          # App token so the opened Version PR triggers CI; npm publish stays OIDC (id-token).
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
