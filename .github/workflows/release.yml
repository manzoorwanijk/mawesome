name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # never cancel an in-flight publish

# Least privilege: no permissions by default; each job grants only what it needs.
permissions: {}

jobs:
  # Re-run the full gate (read-only) so nothing publishes without it.
  verify:
    name: Verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
      - run: pnpm audit --audit-level=high

  release:
    name: Publish
    needs: verify
    runs-on: ubuntu-latest
    # Configure a protected "npm-publish" environment (required reviewers / branch
    # restriction) in the repo settings, and scope each npm trusted-publisher entry to
    # it, for an extra approval gate before any publish.
    environment: npm-publish
    permissions:
      contents: write # changesets pushes the Version PR branch
      pull-requests: write # changesets opens/updates the Version PR
      id-token: write # npm OIDC trusted publishing (no NPM_TOKEN)
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
      # Credentials persist here so changesets can push the Version PR branch.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      # Node 24 bundles npm >= 11.5.1, which OIDC trusted publishing requires.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
      - run: pnpm install --frozen-lockfile
      - run: pnpm build # dist must exist for `changeset publish`
      - name: Create Version PR or publish
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm run version
          publish: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
