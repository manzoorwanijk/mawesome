name: Verify

# Pull requests are gated here; pushes to main are gated by the verify job in release.yml.
on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, build, test
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run verification gate
        run: pnpm verify
      - name: Audit dependencies
        run: pnpm audit --audit-level=high

  # The full gate needs Node >=24.12 (internal .ts scripts rely on native type stripping), so this job exercises the published package's Node floor separately.
  # It installs and builds on Node 24, then runs dependency-audit's tests and built CLI on each supported Node line.
  node-compat:
    name: Node ${{ matrix.node }} compat
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 24, 26]
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      # check-latest so a stale runner-cached 24.x below the root >=24.12 floor can't be used.
      - name: Set up Node.js 24 (build toolchain)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
          check-latest: true
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build dependency-audit
        run: pnpm --filter @mawesome/dependency-audit build
      - name: Set up Node.js ${{ matrix.node }} (latest)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
          check-latest: true
      # Invoke vitest directly: pnpm enforces the root engines (>=24.12) on every `pnpm run`, which would fail on the older matrix lines.
      - name: Run tests on Node ${{ matrix.node }}
        working-directory: packages/dependency-audit
        run: node_modules/.bin/vitest run
      - name: Smoke-test the built CLI on Node ${{ matrix.node }}
        run: |
          node packages/dependency-audit/dist/cli.js --version
          node packages/dependency-audit/dist/cli.js --no-progress packages/dependency-audit
