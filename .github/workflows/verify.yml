name: Verify

# Pull requests are gated here; pushes to main are gated by the verify job in release.yml.
on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, build, test
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run verification gate
        run: pnpm verify
      # Dogfood dependency-audit on our own packages (built by the gate above; non-packages are skipped).
      - name: Audit released imports
        run: node packages/dependency-audit/src/cli.ts packages/*

  # The full gate needs Node >=24.12 (internal .ts scripts rely on native type stripping), so this job exercises the published package's Node floor separately.
  # It installs and builds on Node 24, then runs dependency-audit's tests and built CLI on each supported Node line.
  node-compat:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node: [20, 24, 26]
        include:
          # Windows shells don't expand globs, so exercise the built CLI + tests there on one representative Node line.
          - os: windows-latest
            node: 24
    steps:
      # harden-runner only supports Linux runners — skip it on Windows.
      - name: Harden runner
        if: runner.os == 'Linux'
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      # check-latest so a stale runner-cached 24.x below the root >=24.12 floor can't be used.
      - name: Set up Node.js 24 (build toolchain)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          check-latest: true
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build dependency-audit
        run: pnpm --filter @mawesome/dependency-audit build
      - name: Set up Node.js ${{ matrix.node }} (latest)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          check-latest: true
      # Invoke vitest directly: pnpm enforces the root engines (>=24.12) on every `pnpm run`, which would fail on the older matrix lines.
      - name: Run tests on Node ${{ matrix.node }}
        working-directory: packages/dependency-audit
        # bash on every OS (Git Bash on Windows) so the node_modules/.bin shim resolves uniformly.
        shell: bash
        run: node_modules/.bin/vitest run
      - name: Smoke-test the built CLI on Node ${{ matrix.node }}
        # A quoted "packages/*" stays literal in bash, so this exercises the CLI's own glob expansion.
        shell: bash
        run: |
          node packages/dependency-audit/dist/cli.js --version
          node packages/dependency-audit/dist/cli.js --no-progress "packages/*"
