packages:
  - 'packages/*'
  - 'tools/*'
  - 'apps/*'

# --- toolchain reproducibility ---
packageManagerStrictVersion: true # pnpm 10 setting (pnpm 11 renames it to `pmOnFail`)

# --- security / supply-chain ---
minimumReleaseAge: 4320 # 3 days; defers any release younger than this at resolution time
minimumReleaseAgeExclude: [] # every pinned version is already older than the window
# Build-script policy. `allowBuilds` (pnpm >=10.26, replaces onlyBuiltDependencies/ignoredBuiltDependencies)
# is a map of matchers -> allow (true) / deny (false); with strictDepBuilds, any unlisted build-script dep fails.
allowBuilds:
  esbuild: true # apps/site (Astro/Vite): build script only installs the prebuilt platform binary, no compile
  sharp: false # apps/site: Astro's native image optimizer — unused (image service set to passthrough), so don't build

strictDepBuilds: true # fail install if an un-allowlisted dep wants to run a build script
verifyDepsBeforeRun: error # node_modules must match the lockfile before any `pnpm run`

# Security overrides: force transitive deps onto patched versions flagged by `pnpm audit`.
# Drop an entry once every dependent's own range has moved past the vulnerable window.
overrides:
  esbuild@<0.28.1: '^0.28.1' # GHSA-gv7w-rqvm-qjhr (via astro/vite + vitest)
  form-data@<4.0.6: '^4.0.6' # GHSA-hmw2-7cc7-3qxx (via @types/pacote)

# --- no hoisting: a workspace may import only what it declares (pairs with no-root-deps) ---
nodeLinker: isolated
hoist: false
publicHoistPattern: []

# --- pnpm client settings (kept here, not in .npmrc) ---
engineStrict: true
autoInstallPeers: false
dedupePeerDependents: true
strictPeerDependencies: true

# --- one lockfile covers every CI OS/CPU for the native tools (oxlint/oxfmt/rolldown) ---
supportedArchitectures:
  os:
    - current
    - linux
    - darwin
    - win32
  cpu:
    - current
    - x64
    - arm64
